<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Panel de Admin - TiendaBea</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Open+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body data-page="admin">
  <nav class="navbar" id="navbar"></nav>
  
  <div class="container">
    <div class="admin-container">
      <div class="admin-header">
        <h1 class="section-title">Panel de Administrador</h1>
      </div>
      
      <div class="admin-tabs">
        <button class="admin-tab active" data-tab="dashboard">Dashboard</button>
        <button class="admin-tab" data-tab="products">Productos</button>
        <button class="admin-tab" data-tab="orders">Pedidos</button>
        <button class="admin-tab" data-tab="users">Usuarios</button>
      </div>
      
      <!-- Dashboard Tab -->
      <div id="dashboard-tab" class="admin-content">
        <h2>Dashboard de Gestión</h2>
        <p class="mb-4 text-gray-600">Visualiza el inventario por sede y estadísticas de ventas mensuales.</p>
        <a href="/dashboard" class="btn btn-primary">
          <i class="fas fa-chart-line mr-2"></i>Abrir Dashboard Completo
        </a>
      </div>
      
      <!-- Products Tab -->
      <div id="products-tab" class="admin-content">
        <div class="d-flex justify-content-between align-items-center mb-3">
          <h2>Gestión de Productos</h2>
          <button class="btn btn-primary" id="add-product-btn">Agregar Producto</button>
        </div>
        
        <div class="mb-3">
          <input type="text" id="product-search" class="form-input" placeholder="Buscar productos..." style="max-width: 300px;">
        </div>
        
        <div id="products-list">
          <div class="loading"><div class="spinner"></div></div>
        </div>
      </div>
      
      <!-- Orders Tab -->
      <div id="orders-tab" class="admin-content d-none">
        <h2>Todos los Pedidos</h2>
        <div class="mb-2">
          <input type="text" id="order-search" class="form-input" placeholder="Buscar por código de pedido..." style="max-width: 300px;">
          <button class="btn btn-primary" onclick="AdminPage.searchOrders()">Buscar</button>
        </div>
        <div id="orders-list">
          <div class="loading"><div class="spinner"></div></div>
        </div>
      </div>
      
      <!-- Users Tab -->
      <div id="users-tab" class="admin-content d-none">
        <h2>Usuarios Registrados</h2>
        <div id="users-list">
          <div class="loading"><div class="spinner"></div></div>
        </div>
      </div>
    </div>
  </div>
  
  <!-- Product Modal -->
  <div class="modal" id="product-modal">
    <div class="modal-content">
      <div class="modal-header">
        <h2 id="product-modal-title">Agregar Producto</h2>
        <button class="modal-close" id="close-modal">&times;</button>
      </div>
      <form id="product-form">
        <input type="hidden" id="product_id">
        
        <div class="form-group">
          <label class="form-label" for="product_id_display">ID del Producto</label>
          <input type="text" id="product_id_display" class="form-input" placeholder="ID (números y letras)">
        </div>
        
        <div class="form-group">
          <label class="form-label" for="product_name">Nombre del Producto</label>
          <input type="text" id="product_name" class="form-input" required>
        </div>
        
        <div class="form-group">
          <label class="form-label" for="product_description">Descripción</label>
          <textarea id="product_description" class="form-textarea"></textarea>
        </div>
        
        <div class="form-group">
          <label class="form-label" for="product_price">Precio</label>
          <input type="number" id="product_price" class="form-input" step="0.01" required>
        </div>
        
        <div class="form-group">
          <label class="form-label" for="product_stock">Stock</label>
          <input type="number" id="product_stock" class="form-input" value="0">
        </div>
        
        <div class="form-group">
          <label class="form-label" for="product_category">Categoría</label>
          <select id="product_category" class="form-select">
            <option value="">Seleccionar Categoría</option>
          </select>
        </div>
        
        <div class="form-group">
          <label class="form-label" for="product_active">
            <input type="checkbox" id="product_active" checked> Producto Activo
          </label>
        </div>
        
        <div class="form-group">
          <label class="form-label" for="product_image">Imagen</label>
          <input type="file" id="product_image" class="form-input" accept="image/*">
        </div>
        
        <button type="submit" class="btn btn-primary" style="width: 100%;">Guardar Producto</button>
      </form>
    </div>
  </div>
  
  <script src="/js/app.js"></script>
  <script>
    // Product Modal Controller
    const AdminProductModal = {
      open: (product = null) => {
        const modal = document.getElementById('product-modal');
        const title = document.getElementById('product-modal-title');
        const form = document.getElementById('product-form');
        
        // Load categories
        fetch('/api/categories')
          .then(r => r.json())
          .then(categories => {
            const select = document.getElementById('product_category');
            select.innerHTML = '<option value="">Select Category</option>';
            categories.forEach(cat => {
              select.innerHTML += `<option value="${cat.id}">${cat.name}</option>`;
            });
            
            if (product) {
              title.textContent = 'Edit Product';
              document.getElementById('product_id').value = product.id;
              document.getElementById('product_id_display').value = product.id;
              document.getElementById('product_name').value = product.name;
              document.getElementById('product_description').value = product.description || '';
              document.getElementById('product_price').value = product.price;
              document.getElementById('product_stock').value = product.stock;
              document.getElementById('product_category').value = product.category_id || '';
              document.getElementById('product_active').checked = product.is_active === 1;
            } else {
              title.textContent = 'Add Product';
              form.reset();
              document.getElementById('product_id').value = '';
              document.getElementById('product_id_display').value = '';
            }
          });
        
        modal.classList.add('active');
      },
      
      close: () => {
        document.getElementById('product-modal').classList.remove('active');
      },
      
      save: async () => {
        const productId = document.getElementById('product_id').value;
        const newProductId = document.getElementById('product_id_display').value.trim();
        const formData = new FormData();
        
        formData.append('id', newProductId || productId);
        formData.append('name', document.getElementById('product_name').value);
        formData.append('description', document.getElementById('product_description').value);
        formData.append('price', document.getElementById('product_price').value);
        formData.append('stock', document.getElementById('product_stock').value);
        formData.append('category_id', document.getElementById('product_category').value);
        formData.append('is_active', document.getElementById('product_active').checked ? '1' : '0');
        
        const imageFile = document.getElementById('product_image').files[0];
        if (imageFile) {
          formData.append('image', imageFile);
        }
        
        try {
          const token = localStorage.getItem('token');
          let url, method;
          if (productId && newProductId && newProductId !== productId) {
            // ID changed - delete old and create new
            await fetch(`/api/products/${productId}`, {
              method: 'DELETE',
              headers: { 'Authorization': `Bearer ${token}` }
            });
            url = '/api/products';
            method = 'POST';
          } else if (productId) {
            url = `/api/products/${productId}`;
            method = 'PUT';
          } else {
            url = '/api/products';
            method = 'POST';
          }
          
          const response = await fetch(url, {
            method,
            headers: { 'Authorization': `Bearer ${token}` },
            body: formData
          });
          
          if (!response.ok) {
            const data = await response.json();
            throw new Error(data.error);
          }
          
          UI.showToast('Product saved!');
          AdminProductModal.close();
          AdminPage.loadProducts();
        } catch (e) {
          UI.showToast(e.message, 'error');
        }
      }
    };
    
    // Event listeners
    document.addEventListener('DOMContentLoaded', () => {
      // Add product button
      document.getElementById('add-product-btn').addEventListener('click', () => {
        AdminProductModal.open();
      });
      
      // Product search
      const productSearch = document.getElementById('product-search');
      if (productSearch) {
        productSearch.addEventListener('keypress', (e) => {
          if (e.key === 'Enter') {
            AdminPage.searchProducts();
          }
        });
      }
      
      // Close modal
      document.getElementById('close-modal').addEventListener('click', () => {
        AdminProductModal.close();
      });
      
      // Close modal on outside click
      document.getElementById('product-modal').addEventListener('click', (e) => {
        if (e.target.id === 'product-modal') {
          AdminProductModal.close();
        }
      });
      
      // Product form submit
      document.getElementById('product-form').addEventListener('submit', (e) => {
        e.preventDefault();
        AdminProductModal.save();
      });
    });
    
    // Global functions for onclick handlers
    window.editProduct = async (productId) => {
      // Decode the product ID in case it was URL-encoded
      productId = decodeURIComponent(productId);
      try {
        const product = await api.get(`/products/${productId}`);
        AdminProductModal.open(product);
      } catch (e) {
        UI.showToast(e.message, 'error');
      }
    };
    
    window.deleteProduct = async (productId) => {
      // Decode the product ID in case it was URL-encoded
      productId = decodeURIComponent(productId);
      if (!confirm('Are you sure you want to delete this product?')) return;
      
      try {
        await api.delete(`/products/${productId}`);
        UI.showToast('Product deleted');
        AdminPage.loadProducts();
      } catch (e) {
        UI.showToast(e.message, 'error');
      }
    };
  </script>
</body>
</html>
