<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar Sesión - TiendaBea</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Open+Sans400;500;:wght@600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body data-page="login">
  <nav class="navbar" id="navbar"></nav>
  
  <div class="auth-container">
    <div class="auth-card">
      <h1 class="auth-title">Iniciar Sesión</h1>
      
      <!-- Verification success message -->
      <div id="verification-success" class="alert alert-success" style="display: none;">
        ✓ Tu correo ha sido verificado exitosamente. Ahora puedes iniciar sesión.
      </div>
      
      <!-- Verification error message -->
      <div id="verification-error" class="alert alert-error" style="display: none;"></div>
      
      <!-- Email not verified message -->
      <div id="not-verified-alert" class="alert alert-warning" style="display: none;">
        <p>Debes verificar tu correo electrónico antes de iniciar sesión.</p>
        <p id="verification-email-text"></p>
        <button type="button" id="resend-verification-btn" class="btn btn-secondary" style="margin-top: 10px;">
          Reenviar correo de verificación
        </button>
      </div>
      
      <form id="login-form">
        <div class="form-group">
          <label class="form-label" for="username">Usuario o Correo</label>
          <input type="text" id="username" class="form-input" required>
        </div>
        
        <div class="form-group">
          <label class="form-label" for="password">Contraseña</label>
          <div style="position: relative;">
            <input type="password" id="password" class="form-input" required style="padding-right: 40px;">
            <button type="button" onclick="togglePassword()" style="position: absolute; right: 10px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: #666; font-size: 18px;">👁️</button>
          </div>
        </div>
        
        <div class="form-group" style="display: flex; align-items: center; gap: 10px;">
          <input type="checkbox" id="remember" style="width: auto; margin: 0;">
          <label for="remember" style="margin: 0; font-weight: normal; cursor: pointer;">Guardar sesión</label>
        </div>
        
        <button type="submit" class="btn btn-primary" style="width: 100%;">Iniciar Sesión</button>
      </form>
      
      <div class="auth-footer">
        <p>¿No tienes una cuenta? <a href="/register">Regístrate aquí</a></p>
      </div>
    </div>
  </div>
  
  <script>
    // Check URL params for verification status
    const urlParams = new URLSearchParams(window.location.search);
    const verified = urlParams.get('verified');
    const error = urlParams.get('error');
    
    if (verified === '1') {
      document.getElementById('verification-success').style.display = 'block';
    } else if (error) {
      const errorDiv = document.getElementById('verification-error');
      if (error === 'invalid_token') {
        errorDiv.textContent = 'El enlace de verificación ha expirado o es inválido.';
      } else if (error === 'token_missing') {
        errorDiv.textContent = 'Token de verificación faltante.';
      } else {
        errorDiv.textContent = 'Error al verificar el correo.';
      }
      errorDiv.style.display = 'block';
    }
    
    // Toggle password visibility
    function togglePassword() {
      const passwordInput = document.getElementById('password');
      if (passwordInput.type === 'password') {
        passwordInput.type = 'text';
      } else {
        passwordInput.type = 'password';
      }
    }
    
    // Check for saved credentials
    const savedUsername = localStorage.getItem('savedUsername');
    const savedPassword = localStorage.getItem('savedPassword');
    if (savedUsername) document.getElementById('username').value = savedUsername;
    if (savedPassword) document.getElementById('password').value = savedPassword;
    
    // Handle login form submission
    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;
      
      try {
        const response = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        
        const data = await response.json();
        
        if (response.ok) {
          // Handle remember me
          const remember = document.getElementById('remember').checked;
          if (remember) {
            localStorage.setItem('savedUsername', username);
            localStorage.setItem('savedPassword', password);
          } else {
            localStorage.removeItem('savedUsername');
            localStorage.removeItem('savedPassword');
          }
          
          // Store token and redirect
          localStorage.setItem('token', data.token);
          localStorage.setItem('user', JSON.stringify(data.user));
          window.location.href = data.user.role === 'owner' ? '/owner' : 
                                  data.user.role === 'admin' ? '/admin' : '/';
        } else {
          // Check if email is not verified
          if (data.unverified === true) {
            document.getElementById('not-verified-alert').style.display = 'block';
            document.getElementById('verification-email-text').textContent = 
              'Ingresa tu correo para recibir un nuevo enlace';
            document.getElementById('not-verified-alert').dataset.email = username;
          } else {
            alert(data.error || 'Error al iniciar sesión');
          }
        }
      } catch (err) {
        alert('Error de conexión');
      }
    });
    
    // Handle resend verification
    document.getElementById('resend-verification-btn').addEventListener('click', async () => {
      const email = document.getElementById('not-verified-alert').dataset.email;
      const btn = document.getElementById('resend-verification-btn');
      btn.disabled = true;
      btn.textContent = 'Enviando...';
      
      try {
        const response = await fetch('/api/auth/resend-verification', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email })
        });
        
        const data = await response.json();
        
        if (response.ok) {
          alert('Correo de verificación enviado. Revisa tu bandeja de entrada.');
        } else {
          alert(data.error || 'Error al enviar correo');
        }
      } catch (err) {
        alert('Error de conexión');
      }
      
      btn.disabled = false;
      btn.textContent = 'Reenviar correo de verificación';
    });
  </script>
  <script src="/js/app.js"></script>
</body>
</html>
