<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pedidos - TiendaBea Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Open+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body data-page="admin">
  <nav class="navbar" id="navbar"></nav>
  
  <div class="container">
    <div class="admin-container">
      <div class="admin-header">
        <h1 class="section-title">Gestión de Pedidos</h1>
      </div>
      
      <div class="admin-tabs">
        <button class="admin-tab" data-tab="orders" id="orders-tab-btn">Pedidos</button>
      </div>
      
      <!-- Orders Tab -->
      <div id="orders-tab" class="admin-content">
        <div class="mb-2">
          <input type="text" id="order-search" class="form-input" placeholder="Buscar por código de pedido..." style="max-width: 300px;">
          <button class="btn btn-primary" onclick="AdminPage.searchOrders()">Buscar</button>
        </div>
        <div id="orders-list">
          <div class="loading"><div class="spinner"></div></div>
        </div>
      </div>
    </div>
  </div>
  
  <script src="/js/app.js"></script>
  <script>
    // Initialize AdminPage directly with orders tab
    document.addEventListener('DOMContentLoaded', async () => {
      // Check auth
      if (!Auth.isLoggedIn() || !Auth.isAdmin()) {
        window.location.href = '/login';
        return;
      }
      
      // Load orders directly
      await AdminPage.loadAllOrders();
      
      // Setup search
      document.getElementById('order-search').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
          AdminPage.searchOrders();
        }
      });
    });
  </script>
</body>
</html>
