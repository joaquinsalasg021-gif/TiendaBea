<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registrarse - BeaMayorista</title>
  <link rel="icon" type="image/jpeg" href="/pestaña/IconoPestaña.jpg">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Open+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="/css/navbar.css">
  <link rel="stylesheet" href="/css/footer.css">
</head>
<body data-page="register">
  <nav class="navbar" id="navbar"></nav>
  
  <div class="auth-container">
    <div class="auth-card">
      <h1 class="auth-title">Crear Cuenta</h1>
      
      <form id="register-form">
        <div class="form-group">
          <label class="form-label" for="username">Usuario</label>
          <input type="text" id="username" class="form-input" required>
        </div>
        
        <div class="form-group">
          <label class="form-label" for="email">Correo Electrónico</label>
          <input type="email" id="email" class="form-input" required>
        </div>
        
        <div class="form-group">
          <label class="form-label" for="password">Contraseña</label>
          <input type="password" id="password" class="form-input" required>
        </div>
        
        <div class="form-group">
          <label class="form-label" for="name">Nombres</label>
          <input type="text" id="name" class="form-input" required>
        </div>
        
        <div class="form-group">
          <label class="form-label" for="lastname">Apellidos</label>
          <input type="text" id="lastname" class="form-input" required>
        </div>
        
        <div class="form-group">
          <label class="form-label" for="phone">Teléfono (opcional)</label>
          <input type="tel" id="phone" class="form-input">
        </div>
        
        <button type="submit" class="btn btn-primary" style="width: 100%;">Registrarse</button>
      </form>
      
      <div class="auth-footer">
        <p>¿Ya tienes una cuenta? <a href="/login">Inicia sesión aquí</a></p>
      </div>
    </div>
  </div>
  
  <script src="/js/app.js"></script>
  
  <footer class="site-footer">
    <p>© 2026 Bea Mayorista. Todos los derechos reservados.</p>
  </footer>
</body>
</html>
