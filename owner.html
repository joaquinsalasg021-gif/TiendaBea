<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Panel de Owner - TiendaBea</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Open+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body data-page="owner">
  <nav class="navbar" id="navbar"></nav>
  
  <div class="container">
    <div class="admin-container">
      <div class="admin-header">
        <h1 class="section-title">Panel de Propietario</h1>
      </div>
      
      <div class="admin-tabs">
        <button class="admin-tab active" data-tab="admins">Administradores</button>
        <button class="admin-tab" data-tab="settings">Configuración</button>
        <button class="admin-tab" data-tab="products">Productos</button>
        <button class="admin-tab" data-tab="orders">Pedidos</button>
      </div>
      
      <!-- Admins Tab -->
      <div id="admins-tab" class="admin-content">
        <h2>Gestión de Administradores</h2>
        
        <div class="card mb-3">
          <div class="card-header">
            <h3>Crear Nuevo Administrador</h3>
          </div>
          <div class="card-body">
            <form id="create-admin-form">
              <div class="form-group">
                <label class="form-label" for="admin_username">Usuario</label>
                <input type="text" id="admin_username" class="form-input" required>
              </div>
              
              <div class="form-group">
                <label class="form-label" for="admin_email">Correo Electrónico (opcional)</label>
                <input type="email" id="admin_email" class="form-input">
              </div>
              
              <div class="form-group">
                <label class="form-label" for="admin_password">Contraseña</label>
                <input type="password" id="admin_password" class="form-input" required>
              </div>
              
              <div class="form-group">
                <label class="form-label" for="admin_name">Nombres</label>
                <input type="text" id="admin_name" class="form-input" required>
              </div>
              
              <div class="form-group">
                <label class="form-label" for="admin_lastname">Apellidos</label>
                <input type="text" id="admin_lastname" class="form-input" required>
              </div>
              
              <div class="form-group">
                <label class="form-label" for="admin_phone">Phone (optional)</label>
                <input type="tel" id="admin_phone" class="form-input">
              </div>
              
              <button type="submit" class="btn btn-primary">Create Administrator</button>
            </form>
          </div>
        </div>
        
        <h3 class="mt-3">Existing Administrators</h3>
        <div id="admins-list">
          <div class="loading"><div class="spinner"></div></div>
        </div>
      </div>
      
      <!-- Settings Tab -->
      <div id="settings-tab" class="admin-content d-none">
        <h2>Store Settings</h2>
        
        <div class="card">
          <div class="card-body">
            <form id="settings-form">
              <div class="form-group">
                <label class="form-label" for="store_name">Store Name</label>
                <input type="text" id="store_name" class="form-input">
              </div>
              
              <div class="form-group">
                <label class="form-label" for="store_phone">WhatsApp Number (for messages)</label>
                <input type="text" id="store_phone" class="form-input" placeholder="e.g., +1234567890">
              </div>
              
              <button type="submit" class="btn btn-primary">Save Settings</button>
            </form>
          </div>
        </div>
      </div>
      
      <!-- Products Tab -->
      <div id="products-tab" class="admin-content d-none">
        <div class="d-flex justify-content-between align-items-center mb-3">
          <h2>Products Management</h2>
          <button class="btn btn-primary" onclick="AdminProductModal.open()">Add Product</button>
        </div>
        
        <div class="mb-3">
          <input type="text" id="product-search" class="form-input" placeholder="Buscar productos..." style="max-width: 300px;">
        </div>
        
        <div id="products-list">
          <div class="loading"><div class="spinner"></div></div>
        </div>
      </div>
      
      <!-- Orders Tab -->
      <div id="orders-tab" class="admin-content d-none">
        <h2>All Orders</h2>
        <div class="mb-2">
          <input type="text" id="order-search" class="form-input" placeholder="Search by order code..." style="max-width: 300px;">
          <button class="btn btn-primary" onclick="AdminPage.searchOrders()">Search</button>
        </div>
        <div id="orders-list">
          <div class="loading"><div class="spinner"></div></div>
        </div>
      </div>
    </div>
  </div>
  
  <!-- Product Modal -->
  <div class="modal" id="product-modal">
    <div class="modal-content">
      <div class="modal-header">
        <h2 id="product-modal-title">Add Product</h2>
        <button class="modal-close" onclick="AdminProductModal.close()">&times;</button>
      </div>
      <form id="product-form">
        <input type="hidden" id="product_id">
        
        <div class="form-group">
          <label class="form-label" for="product_name">Product Name</label>
          <input type="text" id="product_name" class="form-input" required>
        </div>
        
        <div class="form-group">
          <label class="form-label" for="product_description">Description</label>
          <textarea id="product_description" class="form-textarea"></textarea>
        </div>
        
        <div class="form-group">
          <label class="form-label" for="product_price">Price</label>
          <input type="number" id="product_price" class="form-input" step="0.01" required>
        </div>
        
        <div class="form-group">
          <label class="form-label" for="product_stock">Stock</label>
          <input type="number" id="product_stock" class="form-input" value="0">
        </div>
        
        <div class="form-group">
          <label class="form-label" for="product_category">Category</label>
          <select id="product_category" class="form-select">
            <option value="">Select Category</option>
          </select>
        </div>
        
        <div class="form-group">
          <label class="form-label" for="product_active">
            <input type="checkbox" id="product_active" checked> Product Active
          </label>
        </div>
        
        <div class="form-group">
          <label class="form-label" for="product_image">Image</label>
          <input type="file" id="product_image" class="form-input" accept="image/*">
        </div>
        
        <button type="submit" class="btn btn-primary" style="width: 100%;">Save Product</button>
      </form>
    </div>
  </div>
  
  <script src="/js/app.js"></script>
  <script>
    // Extended Owner Page for tabs
    document.addEventListener('DOMContentLoaded', () => {
      Navbar.init();
      
      const tabs = document.querySelectorAll('.admin-tab');
      tabs.forEach(tab => {
        tab.addEventListener('click', () => {
          tabs.forEach(t => t.classList.remove('active'));
          tab.classList.add('active');
          
          const tabId = tab.dataset.tab;
          document.querySelectorAll('.admin-content').forEach(c => c.classList.add('d-none'));
          document.getElementById(`${tabId}-tab`).classList.remove('d-none');
          
          if (tabId === 'admins') {
            OwnerPage.loadAdmins();
          } else if (tabId === 'settings') {
            OwnerPage.setupSettings();
          } else if (tabId === 'products') {
            AdminPage.loadProducts();
          } else if (tabId === 'orders') {
            AdminPage.loadAllOrders();
          }
        });
      });
      
      OwnerPage.init();
    });
    
    // Product Modal Controller
    const AdminProductModal = {
      open: (product = null) => {
        const modal = document.getElementById('product-modal');
        const title = document.getElementById('product-modal-title');
        const form = document.getElementById('product-form');
        
        // Load categories
        fetch('/api/categories')
          .then(r => r.json())
          .then(categories => {
            const select = document.getElementById('product_category');
            select.innerHTML = '<option value="">Select Category</option>';
            categories.forEach(cat => {
              select.innerHTML += `<option value="${cat.id}">${cat.name}</option>`;
            });
            
            if (product) {
              title.textContent = 'Edit Product';
              document.getElementById('product_id').value = product.id;
              document.getElementById('product_name').value = product.name;
              document.getElementById('product_description').value = product.description || '';
              document.getElementById('product_price').value = product.price;
              document.getElementById('product_stock').value = product.stock;
              document.getElementById('product_category').value = product.category_id || '';
              document.getElementById('product_active').checked = product.is_active === 1;
            } else {
              title.textContent = 'Add Product';
              form.reset();
              document.getElementById('product_id').value = '';
            }
          });
        
        modal.classList.add('active');
      },
      
      close: () => {
        document.getElementById('product-modal').classList.remove('active');
      },
      
      save: async () => {
        const productId = document.getElementById('product_id').value;
        const formData = new FormData();
        
        formData.append('name', document.getElementById('product_name').value);
        formData.append('description', document.getElementById('product_description').value);
        formData.append('price', document.getElementById('product_price').value);
        formData.append('stock', document.getElementById('product_stock').value);
        formData.append('category_id', document.getElementById('product_category').value);
        formData.append('is_active', document.getElementById('product_active').checked ? '1' : '0');
        
        const imageFile = document.getElementById('product_image').files[0];
        if (imageFile) {
          formData.append('image', imageFile);
        }
        
        try {
          const token = localStorage.getItem('token');
          const url = productId ? `/api/products/${productId}` : '/api/products';
          const method = productId ? 'PUT' : 'POST';
          
          const response = await fetch(url, {
            method,
            headers: { 'Authorization': `Bearer ${token}` },
            body: formData
          });
          
          if (!response.ok) {
            const data = await response.json();
            throw new Error(data.error);
          }
          
          UI.showToast('Product saved!');
          AdminProductModal.close();
          OwnerPage.loadProducts();
        } catch (e) {
          UI.showToast(e.message, 'error');
        }
      }
    };
    
    // Handle product form submit
    document.getElementById('product-form').addEventListener('submit', (e) => {
      e.preventDefault();
      AdminProductModal.save();
    });
    
    // Edit product
    window.AdminPage_editProduct = async (productId) => {
      try {
        const product = await api.get(`/products/${productId}`);
        AdminProductModal.open(product);
      } catch (e) {
        UI.showToast(e.message, 'error');
      }
    };
    
    // Edit product alias
    window.editProduct = async (productId) => {
      try {
        const product = await api.get(`/products/${productId}`);
        AdminProductModal.open(product);
      } catch (e) {
        UI.showToast(e.message, 'error');
      }
    };
    
    // Delete product
    window.deleteProduct = async (productId) => {
      if (!confirm('Are you sure you want to delete this product?')) return;
      
      try {
        const token = localStorage.getItem('token');
        const response = await fetch(`/api/products/${productId}`, {
          method: 'DELETE',
          headers: { 'Authorization': `Bearer ${token}` }
        });
        
        if (!response.ok) {
          const data = await response.json();
          throw new Error(data.error);
        }
        
        UI.showToast('Product deleted!');
        AdminPage.loadProducts();
      } catch (e) {
        UI.showToast(e.message, 'error');
      }
    };
  </script>
</body>
</html>
